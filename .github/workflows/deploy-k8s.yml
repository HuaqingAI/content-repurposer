name: Deploy to ACK (K8S)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-k8s-production
  cancel-in-progress: false

env:
  # 阿里云 ACR 配置 - 在 GitHub Secrets 中设置
  ACR_REGISTRY: registry.cn-hangzhou.aliyuncs.com
  ACR_NAMESPACE: ${{ secrets.ACR_NAMESPACE }}
  IMAGE_NAME: content-repurposer

jobs:
  build-and-push:
    name: 构建并推送镜像
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.image-tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 生成镜像 Tag（commit sha 前 7 位）
        id: meta
        run: |
          TAG="${{ github.sha }}"
          SHORT_TAG="${TAG:0:7}"
          echo "image-tag=${SHORT_TAG}" >> $GITHUB_OUTPUT
          echo "Image tag: ${SHORT_TAG}"

      - name: 登录阿里云 ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建并推送镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image-tag }}
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_TELEMETRY_DISABLED=1

  deploy:
    name: 部署到 ACK
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 配置 kubectl（阿里云 ACK）
        uses: aliyun/ack-set-context@v1
        with:
          access-key-id: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          access-key-secret: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          cluster-id: ${{ secrets.ACK_CLUSTER_ID }}

      - name: 替换镜像 Tag
        run: |
          IMAGE="${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image-tag }}"
          sed -i "s|registry.cn-hangzhou.aliyuncs.com/REPLACE_NAMESPACE/content-repurposer:REPLACE_TAG|${IMAGE}|g" k8s/deployment.yaml
          echo "Deploying image: ${IMAGE}"

      - name: 应用 K8S 配置
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/serviceaccount.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/networkpolicy.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: 等待部署完成
        run: |
          kubectl rollout status deployment/content-repurposer \
            --namespace=content-repurposer \
            --timeout=300s

      - name: 健康检查
        run: |
          # 等待 Pod 就绪
          kubectl wait --for=condition=ready pod \
            --selector=app=content-repurposer \
            --namespace=content-repurposer \
            --timeout=120s
          echo "部署成功！"

      - name: 部署失败时回滚
        if: failure()
        run: |
          echo "部署失败，执行回滚..."
          kubectl rollout undo deployment/content-repurposer \
            --namespace=content-repurposer
          echo "已回滚到上一个版本"
