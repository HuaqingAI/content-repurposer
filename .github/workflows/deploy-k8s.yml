name: Deploy to ACK (K8S)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-k8s-production
  cancel-in-progress: false

env:
  # Docker Hub 配置
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_NAME: content-repurposer

jobs:
  build-and-push:
    name: 构建并推送镜像
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.image-tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 生成镜像 Tag（commit sha 前 7 位）
        id: meta
        run: |
          TAG="${{ github.sha }}"
          SHORT_TAG="${TAG:0:7}"
          echo "image-tag=${SHORT_TAG}" >> $GITHUB_OUTPUT
          echo "Image tag: ${SHORT_TAG}"

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建并推送镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image-tag }}
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_TELEMETRY_DISABLED=1
            NEXT_PUBLIC_SUPABASE_URL=https://dummy.supabase.co
            NEXT_PUBLIC_SUPABASE_ANON_KEY=dummy
            SUPABASE_SERVICE_ROLE_KEY=dummy
            DATABASE_URL=postgresql://dummy:dummy@localhost:5432/dummy
            DEEPSEEK_API_KEY=dummy
            QWEN_API_KEY=dummy
            WECHAT_APP_ID=dummy
            WECHAT_APP_SECRET=dummy
            NEXT_PUBLIC_APP_URL=http://localhost:3000

  deploy:
    name: 部署到 ACK
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 配置 kubectl（KubeConfig）
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: 替换镜像 Tag
        run: |
          IMAGE="${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image-tag }}"
          sed -i "s|REPLACE_IMAGE|${IMAGE}|g" k8s/deployment.yaml
          echo "Deploying image: ${IMAGE}"

      - name: 应用 K8S 配置
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/serviceaccount.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/networkpolicy.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: 等待部署完成
        run: |
          kubectl rollout status deployment/content-repurposer \
            --namespace=content-repurposer \
            --timeout=300s

      - name: 健康检查
        run: |
          kubectl wait --for=condition=ready pod \
            --selector=app=content-repurposer \
            --namespace=content-repurposer \
            --timeout=120s
          echo "部署成功！"

      - name: 部署失败时回滚
        if: failure()
        run: |
          echo "部署失败，执行回滚..."
          kubectl rollout undo deployment/content-repurposer \
            --namespace=content-repurposer
          echo "已回滚到上一个版本"
