# 默认拒绝所有流量
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: content-repurposer
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# 允许 Ingress Controller 访问应用
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-app
  namespace: content-repurposer
spec:
  podSelector:
    matchLabels:
      app: content-repurposer
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
---
# 允许应用访问外部（Supabase、AI API 等）
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-app-egress
  namespace: content-repurposer
spec:
  podSelector:
    matchLabels:
      app: content-repurposer
  policyTypes:
    - Egress
  egress:
    # 允许访问 DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # 允许访问外部 HTTPS（Supabase、DeepSeek、Qwen、微信）
    - ports:
        - protocol: TCP
          port: 443
    # 允许访问 Supabase 数据库连接池
    - ports:
        - protocol: TCP
          port: 6543
        - protocol: TCP
          port: 5432
