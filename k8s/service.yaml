apiVersion: v1
kind: Service
metadata:
  name: content-repurposer
  namespace: content-repurposer
  labels:
    app: content-repurposer
spec:
  # ClusterIP 配合 Nginx Ingress Controller 使用
  # 外部流量通过 Ingress → Service → Pod
  type: ClusterIP
  selector:
    app: content-repurposer
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 3000
