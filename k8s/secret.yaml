# ============================================================
# Secret 模板 - 不要提交真实值到 git
# 真实值通过 GitHub Actions Secrets 注入，或手动 kubectl apply
# ============================================================
# 使用方式（手动创建，不走 git）：
#   kubectl create secret generic content-repurposer-secret \
#     --namespace=content-repurposer \
#     --from-literal=DATABASE_URL="postgresql://..." \
#     --from-literal=DIRECT_URL="postgresql://..." \
#     --from-literal=SUPABASE_SERVICE_ROLE_KEY="sb_secret_..." \
#     --from-literal=DEEPSEEK_API_KEY="..." \
#     --from-literal=QWEN_API_KEY="..." \
#     --from-literal=WECHAT_APP_ID="..." \
#     --from-literal=WECHAT_APP_SECRET="..."
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: content-repurposer-secret
  namespace: content-repurposer
  labels:
    app: content-repurposer
type: Opaque
stringData:
  DATABASE_URL: "REPLACE_WITH_REAL_VALUE"
  DIRECT_URL: "REPLACE_WITH_REAL_VALUE"
  SUPABASE_SERVICE_ROLE_KEY: "REPLACE_WITH_REAL_VALUE"
  DEEPSEEK_API_KEY: "REPLACE_WITH_REAL_VALUE"
  QWEN_API_KEY: "REPLACE_WITH_REAL_VALUE"
  WECHAT_APP_ID: "REPLACE_WITH_REAL_VALUE"
  WECHAT_APP_SECRET: "REPLACE_WITH_REAL_VALUE"
